name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Validate, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Just
        run: |
          curl -sSfL https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Build
        run: just build

      - name: Upload JSON as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: updatium-emulation-pack-latest
          path: updatium-emulation-pack-latest.json
          retention-days: 30
